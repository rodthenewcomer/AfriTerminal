# Gates web, API et applications natives sur chaque push et pull request.
name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/live/**"
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript web, API et packages partagés
        run: npx tsc --noEmit
      - name: TypeScript Expo iOS et Android
        run: npx tsc --noEmit -p apps/mobile/tsconfig.json
      - name: ESLint web, API et mobile
        run: npm run lint
      - name: Compatibilité Expo SDK 54
        run: npx expo-doctor apps/mobile
      - name: Versions natives compatibles Expo
        run: npm exec --workspace @wariba/mobile -- expo install --check
      - name: Audit sécurité npm (production, high+)
        run: npm run audit:prod
      - name: Tests unitaires TypeScript (vitest)
        run: npx vitest run
      - name: Dépendances Python (pdfplumber pour le golden test du parseur)
        run: pip install -r scripts/boc/requirements.txt
      - name: Tests Python (fusion BOC, données app, golden test parseur)
        working-directory: scripts/boc
        run: python3 -m unittest discover -p "test_*.py" -v
      - name: Tests Python (pipeline actualités)
        working-directory: scripts/news
        run: python3 -m unittest discover -p "test_*.py" -v
      - name: Build Next.js serveur
        run: npm run build
      - name: Export Metro iOS
        run: npm exec --workspace @wariba/mobile -- expo export --platform ios --output-dir dist/ios
      - name: Export Metro Android
        run: npm exec --workspace @wariba/mobile -- expo export --platform android --output-dir dist/android
