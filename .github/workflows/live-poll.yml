# Collecte intraday des cours différés de 15 min affichés sur brvm.org,
# pour reconstruire un vrai plus haut/plus bas de séance — donnée que le
# bulletin officiel ne publie pas (voir scripts/boc/README.md).
#
# Séance BRVM : 09h45–14h45, heure d'Abidjan = UTC. Les cours affichés
# étant différés de 15 min, on commence à 10h00 (avant, la page montre
# encore la clôture de la veille, ce qui polluerait le "open" du jour)
# et on continue jusqu'à 15h15 pour capter les derniers échanges.
# ~23 sondages par séance ; l'état du jour vit dans
# data/live/AAAA-MM-JJ.json, committé à chaque run — c'est le commit
# qui rend la collecte cumulative d'un run CI au suivant.
#
# Note : les crons GitHub Actions peuvent glisser de quelques minutes
# en période de charge — sans conséquence ici, chaque sondage reste un
# point de mesure valable.
name: live-poll

on:
  schedule:
    - cron: "*/15 10-14 * * 1-5"
    - cron: "0,15 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - name: Sonder les cours (stdlib Python uniquement)
        run: python3 scripts/boc/live_poll.py --out-dir data/live --public-out data/real/live.json
      - name: Committer l'état intraday du jour
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live data/real/live.json
          if git diff --cached --quiet; then
            echo "Aucune cotation nouvelle — rien à committer."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: live poll $(date -u '+%F %H:%M') UTC"
            # 3 tentatives : un autre workflow (boc-daily) peut pousser
            # entre notre checkout et notre push.
            pushed=false
            for i in 1 2 3; do
              if git push; then pushed=true; break; fi
              git pull --rebase origin main
            done
            if [ "$pushed" != true ]; then
              echo "Échec du push après 3 tentatives." >&2
              exit 1
            fi
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-mobile-data:
    needs: poll
    if: needs.poll.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
