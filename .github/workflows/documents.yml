# Rafraîchit la liste des publications officielles (PDF) référencées
# depuis les fiches sociétés BRVM — hebdomadaire, les sociétés publient
# au rythme trimestriel/annuel.
name: documents

on:
  schedule:
    - cron: "40 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: documents
  cancel-in-progress: false

jobs:
  fetch-documents:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - name: Référencer les publications (stdlib Python)
        run: python3 scripts/boc/fetch_documents.py --out data/real/documents.json
      - name: Committer
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/real/documents.json
          if git diff --cached --quiet; then
            echo "Aucune nouvelle publication."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: documents officiels $(date -u +%F)"
            git pull --rebase origin main
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: fetch-documents
    if: needs.fetch-documents.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
