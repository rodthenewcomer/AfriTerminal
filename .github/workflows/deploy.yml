# Publication GitHub Pages des JSON publics consommés par l'app mobile.
# L'application Next.js contient désormais Auth/API/Stripe et doit être
# déployée sur un runtime Node (voir docs/server-deployment.md).
#
# Déclencheurs :
# - push sur main (changements de code ou de données poussés à la main) ;
# - workflow_call : appelé par boc-daily.yml après un commit de données,
#   car les pushes faits avec GITHUB_TOKEN ne déclenchent PAS les
#   workflows `on: push` (garde-fou GitHub contre les boucles) ;
# - workflow_dispatch : relance manuelle depuis l'onglet Actions.
#
# Le checkout se fait toujours sur la pointe de main (pas github.sha) :
# quand ce workflow est appelé juste après un commit de données, ce
# commit est plus récent que le SHA qui a déclenché le run planifié.
name: publish-mobile-data

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/live/**" # collecte intraday, pas encore consommée par le build
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mobile-data-pages
  cancel-in-progress: false

jobs:
  publish-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Configurer GitHub Pages (activation auto au premier run)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Publier les artefacts JSON pour l'app mobile
        run: |
          mkdir -p out/data
          cp -R data/real out/data/real
          cp -R data/news out/data/news
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: publish-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
