# Surveille les publications officielles (PDF) des sociétés BRVM. Une
# publication financière peut changer une décision le jour même : la
# détection vise moins de 15 minutes, puis pousse web + mobile.
name: documents

on:
  schedule:
    - cron: "*/15 5-20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: documents
  cancel-in-progress: false

jobs:
  fetch-documents:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - name: Référencer les publications (stdlib Python)
        run: python3 scripts/boc/fetch_documents.py --out data/real/documents.json
      - name: Générer immédiatement les alertes de publications capitales
        run: python3 scripts/boc/build_alerts.py --out data/real/alerts.json
      - name: Committer
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/real/documents.json data/real/alerts.json
          if git diff --cached --quiet; then
            echo "Aucune nouvelle publication."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: documents officiels $(date -u +%F)"
            pushed=false
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then pushed=true; break; fi
            done
            if [ "$pushed" != true ]; then
              echo "Échec du push après 3 tentatives." >&2
              exit 1
            fi
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: fetch-documents
    if: needs.fetch-documents.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
