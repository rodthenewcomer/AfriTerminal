# Rafraîchit les actualités BRVM toutes les 15 minutes et redéploie les
# données partagées web/mobile dès qu'un article nouveau apparaît.
name: news

on:
  schedule:
    - cron: "*/15 5-20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - name: Récupérer les flux (stdlib Python uniquement)
        run: python3 scripts/news/fetch_news.py --out data/news/news.json
      - name: Committer les nouvelles actualités
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news
          if git diff --cached --quiet; then
            echo "Aucun nouvel article."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: actualités $(date -u '+%F %H:%M') UTC"
            pushed=false
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then pushed=true; break; fi
            done
            if [ "$pushed" != true ]; then
              echo "Échec du push après 3 tentatives." >&2
              exit 1
            fi
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: fetch-news
    if: needs.fetch-news.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
